<!DOCTYPE html>
<html>
<head>
    <title>Register | ECMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b, #334155);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 0;
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            border-radius: 1rem;
            border: none;
        }
    </style>
</head>
<body>

<div class="card auth-card shadow-md p-4 p-md-5 mx-3">

    <div class="text-center mb-4">
        <i class="bi bi-person-badge-fill text-primary" style="font-size: 2.5rem;"></i>
        <h3 class="fw-bold mt-2 text-dark">Create Account</h3>
        <p class="text-muted">Join the ECMS management system</p>
    </div>

    <form method="POST">
        {% csrf_token %}

        {% if error %}
        <div class="alert alert-danger border-0 rounded-3 d-flex align-items-center shadow-sm">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
        </div>
        {% endif %}

        <div class="mb-3">
            <input type="text" name="name" class="form-control form-control-md bg-light border-0" placeholder="Full Name" required>
        </div>

        <div class="mb-3">
            <input type="email" name="email" class="form-control form-control-md bg-light border-0" placeholder="Email Address" required>
        </div>

        <div class="mb-3">
            <input type="text" name="phone" class="form-control form-control-md bg-light border-0" placeholder="Phone Number" required>
        </div>

        <div class="mb-3">
            <select name="role" class="form-select form-control-md bg-light border-0" required>
                <option value="" disabled selected>Select Role</option>
                <option value="ADMIN" disabled>Administrator</option>
                <option value="CONTRACTOR">Contractor</option>
                <option value="ELECTRICIAN">Electrician</option>
            </select>
        </div>

        <div class="mb-4">
            <input type="password" name="password" class="form-control form-control-md bg-light border-0" placeholder="Create Password" required>
        </div>

        <button class="btn btn-success btn-md w-100 mb-4 shadow-sm">Complete Registration</button>
    </form>

    <p class="text-center mb-0 text-muted">
        Already have an account? 
        <a href="{% url 'login' %}" class="text-decoration-none fw-bold text-primary">Sign in</a>
    </p>

</div>

</body>
</html>
