<!DOCTYPE html>
<html>
<head>
    <title>Register | ECMS</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1f2d3d, #3c4b5e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            border-radius: 12px;
        }

        .form-control {
            border-radius: 8px;
        }

        .btn {
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="card auth-card shadow-lg p-4">

    <h3 class="text-center mb-3 fw-bold">Create Account</h3>
    <p class="text-center text-muted mb-4">Join ECMS system</p>

    <form method="POST">
        {% csrf_token %}

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <input type="text" name="name" class="form-control mb-3" placeholder="Full Name" required>

        <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>

        <input type="text" name="phone" class="form-control mb-3" placeholder="Phone" required>

        <select name="role" class="form-control mb-3" required>
            <option value="">Select Role</option>
            <option value="ADMIN" disabled>Admin</option>
            <option value="CONTRACTOR">Contractor</option>
            <option value="ELECTRICIAN">Electrician</option>
        </select>

        <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

        <button class="btn btn-success w-100 mb-3">Register</button>
    </form>

    <p class="text-center mb-0">
        Already have an account? 
        <a href="{% url 'login' %}">Login</a>
    </p>

</div>

</body>
</html>
