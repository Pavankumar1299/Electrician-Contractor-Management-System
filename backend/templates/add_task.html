{% extends 'base.html' %}
{% block content %}

<style>
    .card:hover {
        transform: translateY(0px);
    }
</style>

<div class="row justify-content-center">
    <div class="col-lg-8 col-xl-6">
        
        <div class="d-flex align-items-center mb-4">
            <a href="{% url 'tasks' %}" class="btn btn-light rounded-circle me-3"><i class="bi bi-arrow-left"></i></a>
            <h3 class="fw-bold text-dark m-0">Create New Task</h3>
        </div>

        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-4 p-md-5">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-dark">Task Title <span class="text-danger">*</span></label>
                        <input type="text" name="title" class="form-control bg-light border-0" placeholder="e.g., Wire Main Panel" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-dark">Description</label>
                        <textarea name="description" class="form-control bg-light border-0" rows="3" placeholder="Task details..."></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold text-dark">Select Job <span class="text-danger">*</span></label>
                            <select name="job" class="form-select bg-light border-0" required>
                                <option value="" disabled selected>-- Select --</option>
                                {% for job in jobs %}
                                    <option value="{{ job.id }}">{{ job.title }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold text-dark">Assign Electrician <span class="text-danger">*</span></label>
                            <select name="electrician" class="form-select bg-light border-0" required>
                                <option value="" disabled selected>-- Select --</option>
                                {% for e in electricians %}
                                    <option value="{{ e.id }}">{{ e.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold text-dark">Task Deadline <span class="text-danger">*</span></label>
                            <input type="datetime-local" name="deadline" class="form-control bg-light border-0" min="{% now 'Y-m-d\TH:i' %}" required>
                        </div>

                        <div class="col-md-6 mb-5">
                            <label class="form-label fw-semibold text-dark">Initial Status</label>
                            <select name="status" class="form-select bg-light border-0">
                                <option value="Pending" selected>Pending</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Completed">Completed</option>
                            </select>
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{% url 'tasks' %}" class="btn btn-light px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4 shadow-sm"><i class="bi bi-check2-circle me-1"></i> Save Task</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
