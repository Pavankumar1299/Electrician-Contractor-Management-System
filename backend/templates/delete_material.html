{% extends 'base.html' %}
{% block content %}

<h3 class="text-danger">Delete Material</h3>

<p>Are you sure you want to delete this material?</p>

<ul>
<li>{{ material.name }}</li>
<li>{{ material.quantity }}</li>
<li>{{ material.job.title }}</li>
</ul>

<form method="POST">
{% csrf_token %}
<button class="btn btn-danger">Delete</button>
<a href="{% url 'materials' %}" class="btn btn-secondary">Cancel</a>
</form>

{% endblock %}
