{% extends 'base.html' %}
{% block content %}

<style>
    .card:hover {
        transform: translateY(0px);
    }
</style>

<div class="row justify-content-center mt-5">
    <div class="col-md-8 col-lg-6 text-center">
        <div class="card shadow border-0 rounded-4 overflow-hidden">
            <div class="bg-danger p-4"><i class="bi bi-exclamation-triangle-fill text-white" style="font-size: 3rem;"></i></div>
            <div class="card-body p-5">
                <h3 class="fw-bold text-dark mb-3">Delete Material?</h3>
                <p class="text-muted mb-4">Are you sure you want to remove this inventory item?</p>
                
                <div class="bg-light rounded-3 p-3 text-start mb-4">
                    <div class="mb-2"><strong>Item Name:</strong> <span class="text-dark">{{ material.name }}</span></div>
                    <div class="mb-2"><strong>Quantity:</strong> <span class="text-dark">{{ material.quantity }} {{ material.unit }}</span></div>
                    <div><strong>Assigned Job:</strong> <span class="text-dark">{{ material.job.title }}</span></div>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'materials' %}" class="btn btn-light px-4 py-2">Cancel</a>
                        <button type="submit" class="btn btn-danger px-4 py-2 shadow-sm"><i class="bi bi-trash3 me-1"></i> Yes, Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
