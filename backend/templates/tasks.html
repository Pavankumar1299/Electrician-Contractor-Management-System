{% load static %}

<!DOCTYPE html>
<html>
<head>
<title>ECMS Dashboard</title>

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body>

<div class="d-flex">

<!-- Sidebar -->
<div class="sidebar text-white p-3">

<h4 class="text-center">ECMS</h4>
<hr>

<a href="{% url 'dashboard' %}"><i class="bi bi-speedometer2"></i> Dashboard</a>
<a href="{% url 'electricians' %}"><i class="bi bi-person-workspace"></i> Electricians</a>
<a href="{% url 'jobs' %}"><i class="bi bi-briefcase"></i> Jobs</a>
<a href="{% url 'tasks' %}"><i class="bi bi-list-task"></i> Tasks</a>
<a href="{% url 'materials' %}"><i class="bi bi-box-seam"></i> Materials</a>
<a href="{% url 'reports' %}"><i class="bi bi-bar-chart"></i> Reports</a>
<a href="{% url 'profile' %}"><i class="bi bi-person"></i> Profile</a>

<a href="{% url 'logout' %}" class="nav-link text-danger p-3">
    <i class="bi bi-box-arrow-right"></i> Logout
</a>
</div>

<!-- Main Content -->
<div class="flex-grow-1">

<!-- Top Navbar -->
<nav class="navbar navbar-light bg-white shadow-sm px-4">
<span class="navbar-brand mb-0 h5">Electrician Contractor Management System</span>
</nav>

<div class="container-fluid p-4">

<!-- PAGE CONTENT START -->
<h3>Task Tracking</h3>
<div>
    <div class="dashboard-content">
        <input type="text" id="taskSearch" onkeyup="searchTable('taskSearch','taskTable')" class="form-control mb-3" placeholder="Search Task">

        <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#addTask">
        Add Task
        </button>

        <table class="table table-striped" id="taskTable">
            <thead>
                <tr>
                    <th>Task</th>
                    <th>Electrician</th>
                    <th>Status</th>
                    <th>Progress</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Install Wiring</td>
                    <td>Ravi</td>
                    <td><span class="badge bg-warning">In Progress</span></td>
                    <td>60%</td>
                </tr>

                <tr>
                    <td>Fix Switch</td>
                    <td>Amit</td>
                    <td><span class="badge bg-success">Completed</span></td>
                    <td>100%</td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="modal fade" id="addTask">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5>Add Task</h5>
                </div>

                <div class="modal-body">
                    <input class="form-control mb-2" placeholder="Task Name"><input class="form-control mb-2" placeholder="Electrician">
                    <select class="form-control">
                    <option>Status</option>
                    <option>Pending</option>
                    <option>In Progress</option>
                    <option>Completed</option>
                    </select>

                </div>
                <div class="modal-footer">
                    <button class="btn btn-success">Save</button>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- PAGE CONTENT END -->

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
