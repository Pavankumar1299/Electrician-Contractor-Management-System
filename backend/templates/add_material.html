{% extends 'base.html' %}
{% block content %}

<h3>Add Material</h3>

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label>Name</label>
<input type="text" name="name" class="form-control" required>
</div>

<div class="mb-3">
<label>Total Quantity</label>
<input type="number" name="quantity" class="form-control" required>
</div>

<div class="mb-3">
<label>Unit</label>
    <select type="text" name="unit" class="form-control" required>
        <option value="" disabled selected>-- Select --</option>
        <option value="pcs">pcs</option>
        <option value="kg">kg</option>
        <option value="rolls">rolls</option>
        <option value="meters">meters</option>  
    </select>
</div>

<div class="mb-3">
<label>Used Quantity</label>
<input type="number" name="used_quantity" class="form-control" value="0">
</div>

<div class="mb-3">
<label>Select Job</label>
<select name="job" class="form-control" required>
<option value="" disabled selected>-- Select --</option>
{% for job in jobs %}
<option value="{{ job.id }}">{{ job.title }}</option>
{% endfor %}
</select>
</div>

<button class="btn btn-success">Save</button>
<a href="{% url 'materials' %}" class="btn btn-secondary">Cancel</a>

</form>

{% endblock %}
