{% extends 'base.html' %}
{% block content %}

<style>
    .card:hover {
        transform: translateY(0px);
    }
</style>

<div class="row justify-content-center">
    <div class="col-lg-8 col-xl-6">
        
        <div class="d-flex align-items-center mb-4">
            <a href="{% url 'materials' %}" class="btn btn-light rounded-circle me-3"><i class="bi bi-arrow-left"></i></a>
            <h3 class="fw-bold text-dark m-0">Add New Material</h3>
        </div>

        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-4 p-md-5">
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-dark">Material Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control bg-light border-0" placeholder="e.g., 12-Gauge Copper Wire" required>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-4">
                            <label class="form-label fw-semibold text-dark">Total Qty <span class="text-danger">*</span></label>
                            <input type="number" name="quantity" class="form-control bg-light border-0" placeholder="0" required>
                        </div>
                        <div class="col-md-4 mb-4">
                            <label class="form-label fw-semibold text-dark">Unit <span class="text-danger">*</span></label>
                            <select name="unit" class="form-select bg-light border-0" required>
                                <option value="" disabled selected>Select</option>
                                <option value="pcs">pcs</option>
                                <option value="kg">kg</option>
                                <option value="rolls">rolls</option>
                                <option value="meters">meters</option>  
                            </select>
                        </div>
                        <div class="col-md-4 mb-4">
                            <label class="form-label fw-semibold text-dark">Used Qty</label>
                            <input type="number" name="used_quantity" class="form-control bg-light border-0" value="0">
                        </div>
                    </div>

                    <div class="mb-5">
                        <label class="form-label fw-semibold text-dark">Assign to Job <span class="text-danger">*</span></label>
                        <select name="job" class="form-select bg-light border-0" required>
                            <option value="" disabled selected>-- Select a Job --</option>
                            {% for job in jobs %}
                                <option value="{{ job.id }}">{{ job.title }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{% url 'materials' %}" class="btn btn-light px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4 shadow-sm"><i class="bi bi-box-seam me-1"></i> Save Material</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
