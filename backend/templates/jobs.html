{% extends 'base.html' %}
{% block content %}

<h3>Jobs</h3>

<a href="{% url 'add_job' %}" class="btn btn-primary mb-3">
    Add Job
</a>

<table class="table table-striped">

<thead>
<tr>
<th>Title</th>
<th>Location</th>
<th>Deadline</th>
<th>Electrician</th>
<th>Action</th>
</tr>
</thead>

<tbody>

{% for job in jobs %}
<tr>
<td>{{ job.title }}</td>
<td>{{ job.location }}</td>
<td>{{ job.deadline }}</td>
<td>{{ job.electrician.name }}</td>

<td>
<a href="{% url 'edit_job' job.id %}" class="btn btn-sm btn-warning">Edit</a>
<a href="{% url 'delete_job' job.id %}" class="btn btn-sm btn-danger">Delete</a>
</td>

</tr>
{% empty %}
<tr>
<td colspan="5" class="text-center">No jobs found</td>
</tr>
{% endfor %}

</tbody>

</table>

{% endblock %}
