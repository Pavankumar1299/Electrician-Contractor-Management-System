<!DOCTYPE html>
<html>
<head>
    <title>Login | ECMS</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1f2d3d, #3c4b5e);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
        }

        .form-control {
            border-radius: 8px;
        }

        .btn {
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="card auth-card shadow-lg p-4">

    <h3 class="text-center mb-3 fw-bold">Welcome Back</h3>
    <p class="text-center text-muted mb-4">Login to your ECMS account</p>

    <form method="POST">
        {% csrf_token %}

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
        </div>

        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>

        <button class="btn btn-primary w-100 mb-3">Login</button>
    </form>

    <p class="text-center mb-0">
        Don't have an account? 
        <a href="{% url 'register' %}">Register</a>
    </p>

</div>

</body>
</html>
