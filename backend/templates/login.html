<!DOCTYPE html>
<html>
<head>
    <title>Login | ECMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b, #334155);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            border-radius: 1rem;
            border: none;
        }
    </style>
</head>
<body>

<div class="card auth-card shadow-md p-4 p-md-5 mx-3">
    
    <div class="text-center mb-4">
        <i class="bi bi-lightning-charge-fill text-warning" style="font-size: 2.5rem;"></i>
        <h3 class="fw-bold mt-2 text-dark">Welcome Back</h3>
        <p class="text-muted">Sign in to your ECMS workspace</p>
    </div>

    <form method="POST">
        {% csrf_token %}

        {% if error %}
        <div class="alert alert-danger border-0 rounded-3 d-flex align-items-center shadow-sm">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
        </div>
        {% endif %}

        <div class="mb-3">
            <label class="form-label text-dark fw-medium small">Username</label>
            <input type="text" name="username" class="form-control form-control-md bg-light border-0" placeholder="Enter your username" required>
        </div>

        <div class="mb-4">
            <label class="form-label text-dark fw-medium small">Password</label>
            <input type="password" name="password" class="form-control form-control-md bg-light border-0" placeholder="••••••••" required>
        </div>

        <button class="btn btn-primary btn-md w-100 mb-4 shadow-sm">Sign In</button>
    </form>

    <p class="text-center mb-0 text-muted">
        Don't have an account? 
        <a href="{% url 'register' %}" class="text-decoration-none fw-bold">Register here</a>
    </p>

</div>

</body>
</html>
