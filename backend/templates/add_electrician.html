{% extends 'base.html' %}
{% block content %}

<style>
    .card:hover {
        transform: translateY(0px);
    }
</style>

<div class="row justify-content-center">
    <div class="col-lg-8 col-xl-6">
        
        <div class="d-flex align-items-center mb-4">
            <a href="{% url 'electricians' %}" class="btn btn-light rounded-circle me-3"><i class="bi bi-arrow-left"></i></a>
            <h3 class="fw-bold text-dark m-0">Add New Electrician</h3>
        </div>

        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-4 p-md-5">
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-dark">Full Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control bg-light border-0" placeholder="e.g., John Doe" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold text-dark">Phone Number <span class="text-danger">*</span></label>
                            <input type="text" name="phone" class="form-control bg-light border-0" placeholder="+91 9876543210" required>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold text-dark">Experience (Years) <span class="text-danger">*</span></label>
                            <input type="number" name="experience" class="form-control bg-light border-0" placeholder="e.g., 5" min="0" required>
                        </div>
                    </div>

                    <div class="mb-5">
                        <label class="form-label fw-semibold text-dark">Email Address <span class="text-danger">*</span></label>
                        <input type="email" name="email" class="form-control bg-light border-0" placeholder="electrician@example.com" required>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{% url 'electricians' %}" class="btn btn-light px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4 shadow-sm"><i class="bi bi-person-plus me-1"></i> Save Electrician</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
