{% extends 'base.html' %}
{% block content %}

<h3 class="text-danger">Delete Electrician</h3>

<div class="card p-4 shadow-sm">

    <p>Are you sure you want to delete this electrician?</p>

    <ul>
        <li><strong>Name:</strong> {{ electrician.name }}</li>
        <li><strong>Email:</strong> {{ electrician.email }}</li>
        <li><strong>Phone:</strong> {{ electrician.phone }}</li>
    </ul>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'electricians' %}" class="btn btn-secondary">Cancel</a>
    </form>

</div>

{% endblock %}
