{% extends 'base.html' %}
{% block content %}
<style>
    .card:hover {
        transform: translateY(0px);
    }
</style>

<div class="row justify-content-center">
    <div class="col-lg-8 col-xl-6">
        
        <div class="d-flex align-items-center mb-4">
            <a href="{% url 'jobs' %}" class="btn btn-light rounded-circle me-3"><i class="bi bi-arrow-left"></i></a>
            <h3 class="fw-bold text-dark m-0">Create New Job</h3>
        </div>

        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-4 p-md-5">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-dark">Job Title <span class="text-danger">*</span></label>
                        <input type="text" name="title" class="form-control form-control-lg bg-light border-0" placeholder="e.g., Main Panel Upgrade" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-dark">Description</label>
                        <textarea name="description" class="form-control bg-light border-0" rows="4" placeholder="Detailed scope of work..."></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold text-dark">Location <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="bi bi-geo-alt text-muted"></i></span>
                                <input type="text" name="location" class="form-control bg-light border-0" placeholder="Site address" required>
                            </div>
                        </div>

                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold text-dark">Deadline <span class="text-danger">*</span></label>
                            <input type="date" name="deadline" class="form-control bg-light border-0" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-dark">Assign Electrician</label>
                        <select name="electrician" class="form-select bg-light border-0">
                            <option value="" selected>-- Leave Unassigned --</option>
                            {% for e in electricians %}
                                <option value="{{ e.id }}">{{ e.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-5">
                        <label class="form-label fw-semibold text-dark">Job Image (Optional)</label>
                        <input type="file" name="image" class="form-control bg-light border-0" accept="image/*">
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{% url 'jobs' %}" class="btn btn-light px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4 shadow-sm"><i class="bi bi-check2 me-1"></i> Save Job</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
