<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="d-flex">

<h4 class="text-center">ECMS</h4>

<a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
<a href="electricians.html"><i class="bi bi-person-workspace"></i> Electricians</a>
<a href="jobs.html"><i class="bi bi-briefcase"></i> Jobs</a>
<a href="tasks.html"><i class="bi bi-list-task"></i> Tasks</a>
<a href="materials.html"><i class="bi bi-box-seam"></i> Materials</a>
<a href="reports.html"><i class="bi bi-bar-chart"></i> Reports</a>
<a href="profile.html"><i class="bi bi-person"></i> Profile</a>

</div>

<!-- Main Content -->
<div class="flex-grow-1">

<nav class="navbar navbar-light bg-white shadow-sm px-4">

</nav>

<div class="container-fluid p-4">

<!-- PAGE CONTENT START -->
<h3>Dashboard</h3>

<div class="row">

<h5>Total Electricians</h5>
<h2 id="electriciansCount">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card text-center p-3 bg-success text-white">
<h5>Active Jobs</h5>
<h2 id="jobsCount">0</h2>
</div>
</div>

<h5>Pending Tasks</h5>
<h2 id="tasksCount">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card text-center p-3 bg-info text-white">

<h2 id="completedCount">0</h2>
</div>
</div>

</div>

</div>

</div>

</div>
