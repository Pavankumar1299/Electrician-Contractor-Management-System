<!DOCTYPE html>
<html>
    <head>
        <title>Task Tracking</title>
        <link rel="stylesheet" href="css/style_c.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

        <script src="js/main_c.js"></script>
    </head>
    <body>
        <div class="d-flex">
            <div class="sidebar text-white p-3">
                <h4 class="text-center">ECMS</h4><hr>
                <a href="home.html"><i class=""></i> Home</a>
                <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a href="ele-management.html"><i class=""></i> Electrician Management</a>
                <a href="job-management.html"><i class=""></i>Job Management </a>
                <a href="task.html"><i class="bi bi-list-task"></i> Task Tracking</a>
                <a href="materials.html"><i class="bi bi-box-seam"></i> Materials</a>
                <a href="reports.html"><i class="bi bi-bar-chart"></i> Reports</a>
                <a href="profile.html"><i class="bi bi-person"></i> Profile</a>

            </div>
            <div class="dashboard-content">
                <h3>Task Tracking</h3>
                <input type="text" id="taskSearch" onkeyup="searchTable('taskSearch','taskTable')" class="form-control mb-3" placeholder="Search Task">

                <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#addTask">
                Add Task
                </button>

                <table class="table table-striped" id="taskTable">
                    <thead>
                        <tr>
                            <th>Task</th>
                            <th>Electrician</th>
                            <th>Status</th>
                            <th>Progress</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Install Wiring</td>
                            <td>Ravi</td>
                            <td><span class="badge bg-warning">In Progress</span></td>
                            <td>60%</td>
                        </tr>

                        <tr>
                            <td>Fix Switch</td>
                            <td>Amit</td>
                            <td><span class="badge bg-success">Completed</span></td>
                            <td>100%</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="modal fade" id="addTask">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header"><h5>Add Task</h5>
                    </div>

                    <div class="modal-body">
                        <input class="form-control mb-2" placeholder="Task Name"><input class="form-control mb-2" placeholder="Electrician">
                        <select class="form-control">
                        <option>Status</option>
                        <option>Pending</option>
                        <option>In Progress</option>
                        <option>Completed</option>
                        </select>

                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-success">Save</button>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    </body>
</html>
