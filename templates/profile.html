<script>
    // 1. THE SECURITY GUARD (This runs BEFORE the page loads)
    const accessKey = localStorage.getItem("token");
    
    if (!accessKey || accessKey === null || accessKey === "undefined") {
        // This creates a popup box you CANNOT miss
        alert("ACCESS DENIED: Please login first!");
        // This sends you away
        window.location.replace("/login/");
        // This kills the page so it stays white
        document.write(""); 
    }
</script>
