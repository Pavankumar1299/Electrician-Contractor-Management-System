<script>
    // 1. THE SECURITY GUARD (This runs BEFORE the page loads)
    const accessKey = localStorage.getItem("token");
    
    if (!accessKey || accessKey === null || accessKey === "undefined") {
        // This creates a popup box you CANNOT miss
        alert("ACCESS DENIED: Please login first!");
        // This sends you away
        window.location.replace("/login/");
        // This kills the page so it stays white
        document.write(""); 
    }
</script>

{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>ECMS Dashboard</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        /* Ensuring the sidebar looks like your screenshot */
        .sidebar {
            min-width: 250px;
            background-color: #212529;
            min-height: 100vh;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            font-size: 15px;
        }
        .sidebar a:hover {
            background-color: #343a40;
        }
        .sidebar i {
            margin-right: 10px;
        }
    </style>
</head>

<body>
    <div class="d-flex">
        <div class="sidebar text-white p-0">
            <div class="p-4 text-center">
                <h4>ECMS</h4>
            </div>
            <hr class="m-0">
            <a href="/dashboard/"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="/electricians/"><i class="bi bi-person-workspace"></i> Electricians</a>
            <a href="/jobs/"><i class="bi bi-briefcase"></i> Jobs</a>
            <a href="/tasks/"><i class="bi bi-list-task"></i> Tasks</a>
            <a href="/materials/"><i class="bi bi-box-seam"></i> Materials</a>
            <a href="/reports/"><i class="bi bi-bar-chart"></i> Reports</a>
            <a href="/profile/"><i class="bi bi-person"></i> Profile</a>
            <hr>
            <a href="/login/" onclick="localStorage.clear()" class="text-danger">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </div>

        <div class="flex-grow-1">
            <nav class="navbar navbar-light bg-white border-bottom px-4">
                <span class="navbar-brand mb-0 h6">Electrician Contractor Management System</span>
            </nav>

            <div class="container-fluid p-4">
                <h2 class="mb-4">Dashboard</h2>
                
                <div class="row g-3">
                    <div class="col-md-3">
                        <div class="card text-center p-4 bg-primary text-white border-0 shadow-sm">
                            <h5 class="fw-normal">Total Electricians</h5>
                            <h1 id="electriciansCount" class="display-5 fw-bold">0</h1>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card text-center p-4 bg-success text-white border-0 shadow-sm">
                            <h5 class="fw-normal">Active Jobs</h5>
                            <h1 id="jobsCount" class="display-5 fw-bold">0</h1>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card text-center p-4 bg-warning text-white border-0 shadow-sm">
                            <h5 class="fw-normal">Pending Tasks</h5>
                            <h1 id="tasksCount" class="display-5 fw-bold">0</h1>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card text-center p-4 bg-info text-white border-0 shadow-sm">
                            <h5 class="fw-normal">Completed Work</h5>
                            <h1 id="completedCount" class="display-5 fw-bold">0</h1>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'js/dashboard.js' %}"></script>
</body>
</html>
