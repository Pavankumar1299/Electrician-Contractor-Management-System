<!DOCTYPE html>
<html>
<head>
    <title>ECMS Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<script>
    // Clear everything when they land on the login page
    localStorage.clear();
</script>

<div class="container mt-5">
    <div class="card mx-auto p-4" style="max-width:400px">
        <h3 class="text-center">Login</h3>
        <input id="email" class="form-control mb-3" placeholder="Username">
        <input id="password" type="password" class="form-control mb-3" placeholder="Password">
        <button onclick="loginUser()" class="btn btn-primary w-100">Login</button>
        <p class="text-center mt-3">No account? <a href="/register/">Register</a></p>
    </div>
</div>

<script src="/static/js/login.js"></script>
</body>
</html>
