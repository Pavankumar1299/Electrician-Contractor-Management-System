<div class="container">

<h2>Job Management</h2>

<div class="form-box">

<h3>Create Job</h3>

<form action="/addJob" method="POST">

<label>Job Title</label>
<input type="text" name="title" required>

<label>Location</label>
<input type="text" name="location" required>

<label>Assign Electrician</label>
<input type="text" name="electrician" required>

<label>Status</label>
<input type="text" name="status" placeholder="Pending / Completed">

<button class="form-btn" type="submit">Create Job</button>

</form>
